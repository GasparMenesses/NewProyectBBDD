<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Sistema Deportivo</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="container">
        <div class="form-card">
            <h1>Iniciar sesión</h1>

            <form method="POST">
                <div class="form-group">
                    <label>Usuario</label>
                    <input type="text" name="usuario" required>
                </div>

                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" name="password" required>
                </div>

                <button type="submit" class="btn btn-primary"><i class="fa-solid fa-right-to-bracket"></i>Ingresar</button>
            </form>

            <p style="color:#FCA5A5;">{{ mensaje }}</p>

            <a class="btn btn-alt" href="/register"><i class="fa-solid fa-user-plus"></i>Crear usuario</a>
        </div>
    </div>
</body>
</html>
